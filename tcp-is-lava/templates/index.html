<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCP IS LAVA</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-top: 5vh;
        }
        h1 {
            color: #ff3333;
            text-shadow: 0 0 10px #ff3333, 0 0 20px #8b0000;
            font-size: 4rem;
            letter-spacing: 5px;
            margin: 0;
        }
        h2 {
            color: #ffaa00;
            font-size: 1.2rem;
            letter-spacing: 3px;
            margin-top: 10px;
        }
        .inputs {
            margin: 40px 0;
            display: flex;
            gap: 10px;
        }
        input {
            background-color: transparent;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 15px;
            font-family: monospace;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }
        input:focus { border-color: #00ff00; }
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }
        button {
            background: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 15px 30px;
            font-size: 1rem;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        button:hover {
            background-color: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
        button::before { content: "▶"; font-size: 0.8rem; }
        
        .terminal {
            width: 80%;
            max-width: 800px;
            height: 250px;
            background-color: #000;
            border: 1px solid #30363d;
            padding: 20px;
            overflow-y: auto;
            text-align: left;
            box-shadow: inset 0 0 10px #000;
        }
        .log-entry { margin-bottom: 10px; }
        .log-out { color: #58a6ff; } /* Mavi Gidiş */
        .log-in { color: #3fb950; }  /* Yeşil Geliş */
        .system-msg { color: #8b949e; font-style: italic; }
    </style>
</head>
<body>

    <div class="header">
        <h1>TCP IS LAVA</h1>
        <h2>3 - W A Y   H A N D S H A K E</h2>
    </div>

    <div class="inputs">
        <input type="text" id="targetIp" placeholder="Target IP (örn: 8.8.8.8)" style="width: 200px;">
        <input type="number" id="targetPort" placeholder="Port (örn: 53)" style="width: 100px;">
    </div>

    <div class="controls">
        <button onclick="simulate('SYN')">SEND SYN</button>
        <button onclick="simulate('ACK')">SEND ACK</button>
        <button onclick="simulate('FIN')">SEND FIN</button>
    </div>

    <div class="terminal" id="terminal">
        <div class="system-msg">> Sistem başlatıldı. Hedef IP ve Port girerek paket göndermeye başlayın.</div>
    </div>

    <script>
        async function simulate(flag) {
            const ip = document.getElementById('targetIp').value;
            const port = document.getElementById('targetPort').value;
            const terminal = document.getElementById('terminal');

            if(!ip || !port) {
                appendLog("HATA: Lütfen IP ve Port girin.", "system-msg");
                return;
            }

            appendLog(`> ${flag} Paketi hazırlanıyor...`, "system-msg");

            try {
                const response = await fetch('/send_packet', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ip, port, flag })
                });
                
                const result = await response.json();
                
                appendLog(result.log_out, "log-out");
                if (result.log_in) {
                    appendLog(result.log_in, "log-in");
                }
            } catch (error) {
                appendLog("HATA: Sunucu ile iletişim kurulamadı.", "system-msg");
            }
        }

        function appendLog(text, className) {
            const terminal = document.getElementById('terminal');
            const div = document.createElement('div');
            div.className = `log-entry ${className}`;
            div.textContent = text;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight; // Otomatik aşağı kaydır
        }
    </script>
</body>
</html>
